services:
  - type: web
    name: iadss-mvp
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: iadss-db
          property: connectionString

databases:
  - name: iadss-db
    plan: free
